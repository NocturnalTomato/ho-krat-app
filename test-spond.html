<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spond Test</title>
</head>
<body>
  <h1>Spond Worker Test</h1>

  <button onclick="loadSpond()">Laad Spond</button>

  <pre id="output">Nog niks geladen.</pre>

  <script>
    async function loadSpond() {
      const output = document.getElementById("output");
      output.textContent = "Laden...";

      try {
        const response = await fetch("https://ho-krat-spond-trigger.lucdegoeij.workers.dev/?cache=" + Date.now(), {
          cache: "no-store"
        });

        const data = await response.json();

        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = "Fout: " + err.message;
      }
    }
  </script>
</body>
</html>
