name: Deploy Spond Worker

on:
  push:
    branches: [main]
    paths:
      - "worker-spond/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set CAPTAIN_PASSWORD secret
        working-directory: worker-spond
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: echo "${{ secrets.CAPTAIN_PASSWORD }}" | npx wrangler secret put CAPTAIN_PASSWORD --name ho-krat-spond-trigger

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: worker-spond
