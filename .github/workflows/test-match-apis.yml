name: Test Match APIs

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Call worker probe endpoint
        run: |
          echo "=== Probing match data APIs via Cloudflare Worker ==="
          curl -sf https://ho-krat-spond-trigger.lucdegoeij.workers.dev/probe \
            | python3 -m json.tool
