name: Deploy Kratflap API Worker

on:
  push:
    branches: [main]
    paths:
      - "worker-kratflap-api/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set ADMIN_KEY secret
        working-directory: worker-kratflap-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: echo "${{ secrets.KRATFLAP_ADMIN_KEY }}" | npx wrangler secret put ADMIN_KEY --name ho-kratflap-api

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: worker-kratflap-api
