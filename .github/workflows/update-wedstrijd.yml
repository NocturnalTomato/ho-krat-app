name: Check wedstrijd data APIs

on:
  schedule:
    - cron: "0 5 * * *"   # elke dag 05:00 UTC

  workflow_dispatch:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Probe match data APIs (via Cloudflare Worker)
        run: |
          set +e
          BASE="https://ho-krat-spond-trigger.lucdegoeij.workers.dev"
          echo "=== 1/3  KNHB discovery ==="
          KNHB=$(curl -sf "$BASE/probe/knhb" || echo '{"error":"curl failed"}')
          echo "$KNHB" | python3 -m json.tool

          TEAM_ID=$(echo "$KNHB" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('team_id',''))" 2>/dev/null || true)
          echo "KNHB team_id=$TEAM_ID"

          echo "=== 2/3  HockeyWeerelt discovery ==="
          HW=$(curl -sf "$BASE/probe/hw" || echo '{"error":"curl failed"}')
          echo "$HW" | python3 -m json.tool
          echo "$HW" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('team_id'), d.get('error','HockeyWeerelt team not found')"
          HW_STATUS=$?

          echo "=== 3/3  Clubi doc ==="
          curl -sf "$BASE/probe/clubi?path=/doc.html" | python3 -m json.tool || echo "clubi failed"

          echo "=== 4/4  Standings (poulestand) ==="
          STANDINGS=$(curl -sf "$BASE/standings" || echo '{"error":"curl failed"}')
          echo "$STANDINGS" | python3 -m json.tool
          echo "Top 3 teams:"
          echo "$STANDINGS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          st = d.get('standings', [])
          if not st:
              raise SystemExit(d.get('error', 'No standings returned'))
          for s in st[:3]:
              print(f\"  #{s.get('rank','?')} {s.get('team_name','?')} - GS:{s.get('played','?')} GW:{s.get('won','?')} GL:{s.get('drawn','?')} VL:{s.get('lost','?')} PT:{s.get('points','?')}\")
          "
          STANDINGS_STATUS=$?

          # KNHB/HockeyWeerelt rebuild their club & team data between seasons,
          # so discovery is expected to be flaky during the summer break. Don't
          # send failure notifications for that until RESUME_DATE, when the new
          # season's data should be live and a real failure needs attention.
          if [ "$HW_STATUS" -ne 0 ] || [ "$STANDINGS_STATUS" -ne 0 ]; then
            RESUME_DATE="2026-08-25"
            TODAY=$(date -u +%Y-%m-%d)
            if [[ "$TODAY" < "$RESUME_DATE" ]]; then
              echo "::warning::HockeyWeerelt discovery or standings failed, but it's summer break (before $RESUME_DATE) — treating as non-fatal since KNHB/HockeyWeerelt are likely still preparing next season's data."
              exit 0
            fi
            echo "::error::Discovery/standings still broken on or after $RESUME_DATE — season should be starting, this needs a real look."
            exit 1
          fi
