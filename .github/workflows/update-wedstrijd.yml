name: Update wedstrijd

on:
  schedule:
    - cron: "0 5 * * *"   # elke dag 05:00 UTC

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        run: node scrape.js

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add wedstrijd.json
          git add debug_scrape.json
          git add debug_full_page.html

          git diff --cached --quiet || git commit -m "Update wedstrijd data"

          git push