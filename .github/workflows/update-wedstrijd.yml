name: Update wedstrijd

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scrape.js

      - name: Commit json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add wedstrijd.json

          git diff --cached --quiet || git commit -m "Update wedstrijd"

          git push