name: Update wedstrijd

on:
  schedule:
    - cron: "0 5 * * *"   # elke dag 05:00 UTC

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe match data APIs (via Cloudflare Worker)
        run: |
          BASE="https://ho-krat-spond-trigger.lucdegoeij.workers.dev"
          echo "=== 1/3  KNHB discovery ==="
          KNHB=$(curl -sf "$BASE/probe/knhb" || echo '{"error":"curl failed"}')
          echo "$KNHB" | python3 -m json.tool

          TEAM_ID=$(echo "$KNHB" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('team_id',''))" 2>/dev/null || true)
          echo "KNHB team_id=$TEAM_ID"

          echo "=== 2/3  HockeyWeerelt discovery ==="
          HW=$(curl -sf "$BASE/probe/hw" || echo '{"error":"curl failed"}')
          echo "$HW" | python3 -m json.tool

          echo "=== 3/3  Clubi doc ==="
          curl -sf "$BASE/probe/clubi?path=/doc.html" | python3 -m json.tool || echo "clubi failed"

      - name: Run scraper
        run: node scrape.js

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add wedstrijd.json
          git add debug_scrape.json
          git add debug_full_page.html

          git diff --cached --quiet || git commit -m "Update wedstrijd data"

          git push