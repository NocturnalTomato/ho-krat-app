name: Spond Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  spond-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install spond

      - name: Run Spond check
        env:
          SPOND_USERNAME: ${{ secrets.SPOND_USERNAME }}
          SPOND_PASSWORD: ${{ secrets.SPOND_PASSWORD }}
        run: python spond_check.py

      - name: Commit upcoming event file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add upcoming-event.json
          git commit -m "Update upcoming Spond event" || echo "No changes to commit"
          git push

      - name: Upload output JSON
        uses: actions/upload-artifact@v4
        with:
          name: upcoming-event
          path: upcoming-event.json