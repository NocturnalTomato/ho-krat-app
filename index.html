<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HO Krat App</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2b2b2f, #050505 65%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .card {
      width: min(94vw, 460px);
      padding: 28px 22px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      text-align: center;
    }

    .small {
      color: #a1a1a6;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 1.4px;
    }

    .title {
      font-size: 40px;
      font-weight: 950;
      line-height: 0.95;
      margin: 8px 0 24px;
      letter-spacing: -1.5px;
    }

    button {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: none;
      background: white;
      color: black;
      font-size: 29px;
      font-weight: 950;
      box-shadow: 0 15px 40px rgba(255, 255, 255, 0.25);
      transition: 0.12s ease;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.94);
      opacity: 0.85;
    }

    .answer {
      margin-top: 28px;
      font-size: 37px;
      font-weight: 950;
      min-height: 46px;
    }

    .sub {
      margin-top: 6px;
      color: #a1a1a6;
      font-size: 17px;
      min-height: 24px;
      line-height: 1.35;
    }

    .event-card {
      margin-top: 24px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.11);
      text-align: left;
    }

    .event-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .event-meta {
      color: #a1a1a6;
      font-size: 14px;
      line-height: 1.35;
    }

    .countdown {
      margin-top: 12px;
      font-size: 28px;
      font-weight: 950;
      text-align: center;
    }

    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat {
      padding: 10px 8px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 950;
    }

    .stat-label {
      margin-top: 2px;
      font-size: 11px;
      color: #a1a1a6;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .chance-box {
      margin-top: 14px;
      display: grid;
      gap: 9px;
    }

    .chance-row {
      display: grid;
      grid-template-columns: 112px 1fr 44px;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: white;
      width: 0%;
    }

    details {
      margin-top: 14px;
      color: #d8d8dc;
      font-size: 14px;
    }

    summary {
      cursor: pointer;
      font-weight: 850;
      color: white;
    }

    .people {
      margin-top: 10px;
      display: grid;
      gap: 12px;
    }

    .people h4 {
      margin: 0 0 5px;
      font-size: 13px;
      color: #a1a1a6;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .names {
      line-height: 1.4;
      font-size: 14px;
    }

    .version {
      margin-top: 22px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
    }

    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .popup-box {
      width: min(88vw, 360px);
      padding: 26px;
      border-radius: 28px;
      background: rgba(30, 30, 32, 0.96);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.65);
      text-align: center;
    }

    .popup-title {
      font-size: 25px;
      font-weight: 950;
      margin-bottom: 22px;
    }

    .popup-buttons {
      display: flex;
      gap: 12px;
    }

    .popup-buttons button {
      flex: 1;
      height: 56px;
      border-radius: 18px;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="small">IS HET TIJD VOOR</div>
    <div class="title">EEN HO KRAT?</div>

    <button onclick="checkHoKrat()">CHECK</button>

    <div class="answer" id="answer">Laden...</div>
    <div class="sub" id="sub">Het Orakel leest de Spond-rollen.</div>

    <div class="event-card" id="eventCard" style="display:none;">
      <div class="event-title" id="eventTitle"></div>
      <div class="event-meta" id="eventMeta"></div>
      <div class="countdown" id="countdown"></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="attendingCount">-</div>
          <div class="stat-label">KOMT</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="declinedCount">-</div>
          <div class="stat-label">NIET</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="unansweredCount">-</div>
          <div class="stat-label">LAF</div>
        </div>
      </div>

      <div class="chance-box">
        <div class="chance-row">
          <div>HO-kans</div>
          <div class="bar"><div class="bar-fill" id="hoBar"></div></div>
          <div id="hoChance">-</div>
        </div>
        <div class="chance-row">
          <div>2e krat</div>
          <div class="bar"><div class="bar-fill" id="secondBar"></div></div>
          <div id="secondChance">-</div>
        </div>
        <div class="chance-row">
          <div>Escalatie</div>
          <div class="bar"><div class="bar-fill" id="escalationBar"></div></div>
          <div id="escalationChance">-</div>
        </div>
      </div>

      <details>
        <summary>Wie dan?</summary>
        <div class="people">
          <div>
            <h4>Komt</h4>
            <div class="names" id="attendingNames">-</div>
          </div>
          <div>
            <h4>Komt niet</h4>
            <div class="names" id="declinedNames">-</div>
          </div>
          <div>
            <h4>Nog niks gezegd</h4>
            <div class="names" id="unansweredNames">-</div>
          </div>
        </div>
      </details>
    </div>

    <div class="version">HO KRAT ORACLE v2.0</div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-box">
      <div class="popup-title" id="popup-title"></div>
      <div class="popup-buttons">
        <button onclick="popupYes()">Ja</button>
        <button onclick="popupNo()">Nee</button>
      </div>
    </div>
  </div>

  <script>
    let popupMode = null;
    let lastPress = 0;
    let eventData = null;
    let chanceData = null;

    const COOLDOWN_MS = 5000;

    const cooldownTexts = [
      "Rustig. De Spiritueel Leider denkt na.",
      "Het Orakel heeft je vraag gehoord.",
      "De signalen zijn nog niet binnen.",
      "De biergoden laten op zich wachten.",
      "De kratenergie fluctueert.",
      "Je dorst is genoteerd.",
      "Het Orakel voelt zich opgejaagd.",
      "De Spiritueel Leider kijkt betekenisvol naar helemaal niets.",
      "Het kratmoment nadert niet sneller door te drukken.",
      "De biergoden hebben je verzoek op 'gelezen' gezet.",
      "De kosmische tap staat nog dicht.",
      "Er wordt nog hoofdelijk nagedacht.",
      "Hoofdelijk omgeslagen, niet hoofdelijk opgedrongen.",
      "Er is nog geen collectieve dorst vastgesteld.",
      "Het Orakel blijft bij zijn eerdere werk.",
      "Je probeert een heilig systeem te brute-forcen.",
      "Het Orakel is even klaar met jou."
    ];

    async function loadEventData() {
      try {
        const response = await fetch("upcoming-event.json?cache=" + Date.now());
        if (!response.ok) throw new Error("JSON niet gevonden");

        eventData = await response.json();
        chanceData = calculateChances(eventData);

        renderEvent(eventData, chanceData);
        setResult("KLAAR.", "Spond is ingelezen. Het kratlot is bekend.");
        startCountdown();
      } catch (error) {
        setResult("NEE.", "Spond-data niet gevonden. Het Orakel werkt offline.");
      }
    }

    function calculateChances(data) {
      const event = data.upcomingEvent || {};
      const counts = event.counts || {};

      const attending = counts.attending || 0;
      const declined = counts.declined || 0;
      const unanswered = counts.unanswered || 0;
      const type = (event.type || "").toLowerCase();

      const seed = stableRandom(event.id || event.startTimestamp || "ho-krat");

      let typeBonus = 0;
      if (type.includes("training")) typeBonus = 12;
      if (type.includes("match") || type.includes("wedstrijd")) typeBonus = 20;
      if (type.includes("td") || type.includes("party")) typeBonus = 35;

      const ho = clamp(
        attending * 4.2 + unanswered * 1.5 + typeBonus + seed * 10,
        3,
        98
      );

      const secondCrate = clamp(
        (attending - 10) * 8 + unanswered * 2 + seed * 15,
        0,
        94
      );

      const escalation = clamp(
        attending * 4.7 + unanswered * 3.2 - declined * 1.4 + typeBonus + seed * 22,
        5,
        99
      );

      return {
        ho: Math.round(ho),
        secondCrate: Math.round(secondCrate),
        escalation: Math.round(escalation)
      };
    }

    function stableRandom(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash % 1000) / 1000;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function renderEvent(data, chances) {
      const event = data.upcomingEvent || {};
      const counts = event.counts || {};
      const start = new Date(event.startTimestamp);
      const end = new Date(event.endTimestamp);

      document.getElementById("eventCard").style.display = "block";
      document.getElementById("eventTitle").textContent = `${event.name || "Onbekend event"} - ${data.team || "HO"}`;

      document.getElementById("eventMeta").innerHTML = `
        ${formatDate(start)} · ${formatTime(start)}-${formatTime(end)}
        <br>
        Locatie: ${event.location || "Nog geen locatie"}
        <br>
        Laatst bijgewerkt: ${formatDateTime(new Date(data.updatedAt))}
      `;

      document.getElementById("attendingCount").textContent = counts.attending ?? "-";
      document.getElementById("declinedCount").textContent = counts.declined ?? "-";
      document.getElementById("unansweredCount").textContent = counts.unanswered ?? "-";

      setChance("ho", chances.ho);
      setChance("second", chances.secondCrate);
      setChance("escalation", chances.escalation);

      document.getElementById("attendingNames").textContent = listNames(event.attending);
      document.getElementById("declinedNames").textContent = listNames(event.declined);
      document.getElementById("unansweredNames").textContent = listNames(event.unanswered);
    }

    function setChance(id, value) {
      document.getElementById(id + "Chance").textContent = value + "%";
      document.getElementById(id + "Bar").style.width = value + "%";
    }

    function startCountdown() {
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      if (!eventData || !eventData.upcomingEvent) return;

      const start = new Date(eventData.upcomingEvent.startTimestamp).getTime();
      const now = Date.now();
      const diff = start - now;

      if (diff <= 0) {
        document.getElementById("countdown").textContent = "NU.";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      if (days > 0) {
        document.getElementById("countdown").textContent = `${days}d ${hours}u ${minutes}m`;
      } else {
        document.getElementById("countdown").textContent = `${hours}u ${minutes}m ${seconds}s`;
      }
    }

    function checkHoKrat() {
      const now = Date.now();

      if (now - lastPress < COOLDOWN_MS) {
        lastPress = now;
        setResult("NEE.", randomFrom(cooldownTexts));
        return;
      }

      lastPress = now;

      if (!eventData || !chanceData) {
        defaultNo();
        return;
      }

      const attending = eventData.upcomingEvent?.counts?.attending || 0;
      const ho = chanceData.ho;
      const second = chanceData.secondCrate;
      const escalation = chanceData.escalation;

      if (ho >= 70) {
        if (second >= 55) {
          openPopup("secondCrate", `ER KOMEN ${attending} MAN. TWEEDE KRAT OVERWEGEN?`);
        } else {
          setResult("JA MAN.", `HO-kans ${ho}%. Escalatie ${escalation}%.`);
          vibratePositive();
        }
      } else if (ho >= 45) {
        setResult("MISSCHIEN.", `HO-kans ${ho}%. Dit ruikt naar overleg.`);
      } else {
        setResult("NEE.", `HO-kans ${ho}%. Te weinig collectieve dorst.`);
      }
    }

    function popupYes() {
      if (popupMode === "secondCrate") {
        closePopup();
        setResult("JA MAN.", `2e krat-kans ${chanceData.secondCrate}%. Niet moeilijk doen.`);
        vibratePositive();
      }
    }

    function popupNo() {
      if (popupMode === "secondCrate") {
        closePopup();
        setResult("SLAP.", "Dan wordt het dus een gecontroleerde dorst.");
      }
    }

    function defaultNo() {
      setResult("NEE.", "Nog geen bruikbare Spond-profetie.");
    }

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function setResult(answer, sub) {
      document.getElementById("answer").textContent = answer;
      document.getElementById("sub").textContent = sub;
    }

    function openPopup(mode, title) {
      popupMode = mode;
      document.getElementById("popup-title").textContent = title;
      document.getElementById("popup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
      popupMode = null;
    }

    function vibratePositive() {
      if (navigator.vibrate) {
        navigator.vibrate([80, 60, 120]);
      }
    }

    function listNames(names) {
      if (!names || !names.length) return "-";
      return names.join(", ");
    }

    function formatDate(date) {
      return date.toLocaleDateString("nl-NL", {
        weekday: "short",
        day: "numeric",
        month: "short"
      });
    }

    function formatTime(date) {
      return date.toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatDateTime(date) {
      return date.toLocaleString("nl-NL", {
        day: "numeric",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    loadEventData();
  </script>
</body>
</html>
