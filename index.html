<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HO Krat App</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>

<body>
  <div class="card">
    <div class="small">IS HET TIJD VOOR</div>
    <div class="title">EEN HO KRAT?</div>

    <button onclick="checkHoKrat()">CHECK</button>

    <div class="answer" id="answer">Druk op de knop.</div>
    <div class="sub" id="sub"></div>
    <div class="spond-status" id="spondStatus">Spond-data laden...</div>

    <div class="event-card" id="eventCard" style="display:none;">
      <div class="event-title" id="eventTitle"></div>
      <div class="event-meta" id="eventMeta"></div>
      <div class="countdown" id="countdown"></div>

      <div class="stats">
        <div class="stat"><div class="stat-value" id="attendingCount">-</div><div class="stat-label">KOMT</div></div>
        <div class="stat"><div class="stat-value" id="declinedCount">-</div><div class="stat-label">NIET</div></div>
        <div class="stat"><div class="stat-value" id="unansweredCount">-</div><div class="stat-label">LAF</div></div>
      </div>

      <div class="chance-box">
        <div class="chance-row">
          <div>2e krat</div>
          <div class="bar"><div class="bar-fill" id="secondBar"></div></div>
          <div id="secondChance">-</div>
        </div>
        <div class="chance-row">
          <div>Escalatie</div>
          <div class="bar"><div class="bar-fill" id="escalationBar"></div></div>
          <div id="escalationChance">-</div>
        </div>
      </div>

      <details>
        <summary>Wie dan?</summary>
        <div class="people">
          <div><h4>Komt</h4><div class="names" id="attendingNames">-</div></div>
          <div><h4>Komt niet</h4><div class="names" id="declinedNames">-</div></div>
          <div><h4>Nog niks gezegd</h4><div class="names" id="unansweredNames">-</div></div>
        </div>
      </details>
    </div>

    <div class="version">HO KRAT ORACLE v2.2</div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-box">
      <div class="popup-title" id="popup-title"></div>
      <div class="popup-buttons">
        <button onclick="popupYes()">Ja</button>
        <button onclick="popupNo()">Nee</button>
      </div>
    </div>
  </div>
</body>
</html>
