      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      width: min(90vw, 420px);
      padding: 32px 24px;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      text-align: center;
    }

    .small {
      color: #a1a1a6;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    .title {
      font-size: 42px;
      font-weight: 900;
      line-height: 0.95;
      margin: 8px 0 34px;
      letter-spacing: -1.5px;
    }

    button {
      width: 165px;
      height: 165px;
      border-radius: 50%;
      border: none;
      background: white;
      color: black;
      font-size: 31px;
      font-weight: 900;
      box-shadow: 0 15px 40px rgba(255, 255, 255, 0.25);
      transition: 0.12s ease;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.94);
      opacity: 0.85;
    }

    .answer {
      margin-top: 38px;
      font-size: 38px;
      font-weight: 900;
      min-height: 48px;
    }

    .sub {
      margin-top: 8px;
      color: #a1a1a6;
      font-size: 18px;
      min-height: 24px;
    }

    .version {
      margin-top: 28px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.8px;
    }

    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .popup-box {
      width: min(88vw, 360px);
      padding: 26px;
      border-radius: 28px;
      background: rgba(30, 30, 32, 0.96);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.65);
      text-align: center;
    }

    .popup-title {
      font-size: 25px;
      font-weight: 900;
      margin-bottom: 22px;
    }

    .popup-buttons {
      display: flex;
      gap: 12px;
    }

    .popup-buttons button {
      flex: 1;
      height: 56px;
      border-radius: 18px;
      font-size: 20px;
    }
  </style>

    function getCurrentMoment() {
      const now = new Date();
      const day = now.getDay();
      const minutes = now.getHours() * 60 + now.getMinutes();

      const isThursday =
        day === 4 &&
        minutes >= 19 * 60 + 15 &&
        minutes <= 23 * 60 + 59;

      const isSunday =
        day === 0 &&
        minutes >= 7 * 60 &&
        minutes <= 20 * 60;

      return { isThursday, isSunday };
    }

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function setResult(answer, sub) {
      document.getElementById("answer").textContent = answer;
      document.getElementById("sub").textContent = sub;
    }

    function openPopup(mode, title) {
      popupMode = mode;
      document.getElementById("popup-title").textContent = title;
      document.getElementById("popup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
      popupMode = null;
    }

    function defaultNo() {
      const r = Math.random();

      if (r < 0.975) {
        setResult("NEE.", "Nog niet, er is geen training of wedstrijd.");
      } else if (r < 0.995) {
        setResult("Check met de Spiritueel Leider.", "De signalen zijn onduidelijk.");
      } else {
        setResult("Vraag het aan de HO.", "Alleen de HO kan hierover oordelen.");
      }
    }

    function checkHoKrat() {
      const now = Date.now();

      if (now - lastPress < COOLDOWN_MS) {
        lastPress = now;
        setResult("NEE.", randomFrom(cooldownTexts));
        return;
      }

      lastPress = now;

      const moment = getCurrentMoment();

      if (moment.isThursday || moment.isSunday) {
        openPopup("firstCrate", "HEBBIE AL EEN KRAT GEHAALD DAN?");
      } else {
        defaultNo();
      }
    }

    function popupYes() {
      const moment = getCurrentMoment();

      if (popupMode === "firstCrate") {
        if (moment.isThursday) {
          openPopup("secondCrate", "ZIJN ER MEER DAN 12 MAN?");
        } else {
          closePopup();
          setResult("NEE.", "Waarom druk je op deze knop dan?");
        }
        return;
      }

      if (popupMode === "secondCrate") {
        closePopup();
        setResult("JA MAN.", "Tijd voor een tweede HO krat.");
        vibratePositive();
      }
    }

    function popupNo() {
      if (popupMode === "firstCrate") {
        closePopup();
        setResult("JA MAN.", "Tijd voor een HO krat.");
        vibratePositive();
        return;
      }

      if (popupMode === "secondCrate") {
        closePopup();
        setResult("NEE.", "Zorg volgende keer voor meer mensen bij de training.");
      }
    }

    function vibratePositive() {
      if (navigator.vibrate) {
        navigator.vibrate([80, 60, 120]);
      }
    }
